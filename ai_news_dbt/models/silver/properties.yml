version: 2

models:

  - name: articles
    columns:
      - name: article_id
        data_tests:
          - unique
          - not_null
      - name: title
        data_tests:
          - not_null
      - name: link
        data_tests:
          - not_null
      - name: source
        data_tests:
          - not_null
      - name: feed_ingestion
        data_tests:
          - not_null
      - name: content
        data_tests:
          - not_null
      - name: content_ingestion
        data_tests:
          - not_null
          